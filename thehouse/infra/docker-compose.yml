services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: thehouse
      POSTGRES_PASSWORD: thehouse
      POSTGRES_DB: thehouse
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage

volumes:
  pg-data:
  qdrant-data:
