name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "thehouse/[dev]" || pip install aiosqlite redis fakeredis greenlet alembic
          pip install ruff

      - name: Lint (ruff)
        run: ruff check core api onchain mcp thehouse/core thehouse/onchain thehouse/gateway || true

      - name: Run tests
        env:
          LAVARD_PROFILE: dev
          THEHOUSE_PROFILE: dev
        run: python -m pytest -q

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t lavard:ci .
